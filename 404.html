<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0a1628" />
<meta name="robots" content="noindex, follow" />
<title>404 · Lost in the data fabric — Blueforge AI</title>
<meta name="description" content="That page is off the wire. Head back to blueforgeai.com." />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0a1628; --fg:#e2e8f0; --fg-mute:#a8b4c6; --fg-dim:#64748b;
    --accent:#3b82f6; --accent-2:#06b6d4; --line:rgba(226,232,240,0.10);
    --sans:'IBM Plex Sans',system-ui,sans-serif; --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);font-family:var(--sans);font-weight:300;-webkit-font-smoothing:antialiased}
  body{display:flex;align-items:center;justify-content:center;padding:24px;background:
    radial-gradient(1200px 600px at 20% -10%,rgba(59,130,246,0.18),transparent 60%),
    radial-gradient(1000px 500px at 100% 110%,rgba(6,182,212,0.14),transparent 60%),
    var(--bg)}
  .card{max-width:680px;width:100%;text-align:left}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent-2);font-weight:500;margin-bottom:18px}
  h1{font-size:clamp(56px,10vw,120px);line-height:0.95;letter-spacing:-0.03em;font-weight:600;margin:0 0 8px;background:linear-gradient(120deg,var(--accent-2),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent}
  h2{font-size:clamp(22px,3vw,32px);font-weight:400;letter-spacing:-0.01em;margin:0 0 18px;color:var(--fg)}
  p{color:var(--fg-mute);line-height:1.55;margin:0 0 12px;max-width:54ch}
  .ascii{font-family:var(--mono);font-size:11px;color:var(--fg-dim);white-space:pre;margin:28px 0;line-height:1.4;border:1px solid var(--line);border-radius:6px;padding:16px 18px;background:rgba(0,0,0,0.2)}
  .actions{display:flex;gap:12px;margin-top:28px;flex-wrap:wrap}
  a.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 20px;border-radius:6px;text-decoration:none;font-family:var(--sans);font-size:14px;letter-spacing:0.01em;transition:transform 0.15s}
  a.btn:hover{transform:translateY(-1px)}
  a.btn--primary{background:linear-gradient(120deg,var(--accent),var(--accent-2));color:#001122;font-weight:500}
  a.btn--ghost{color:var(--fg);border:1px solid var(--line)}
  a.btn--ghost:hover{border-color:var(--accent-2);color:var(--accent-2)}
  :focus-visible{outline:2px solid var(--accent-2);outline-offset:3px;border-radius:4px}
</style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Error · 404</div>
    <h1>404</h1>
    <h2>That tag isn't in the historian.</h2>
    <p>The page you asked for isn't on this site — or it moved. No data was lost; the wire just doesn't run here.</p>
    <pre class="ascii">  STATUS    : 404 NOT_FOUND
  ATTEMPTED : <span id="path"></span>
  LAST_GOOD : /</pre>
    <div class="actions">
      <a class="btn btn--primary" href="/">← Back to homepage</a>
      <a class="btn btn--ghost" href="mailto:info@blueforgeai.com">Email us instead →</a>
    </div>
  </main>
  <script>
    document.getElementById('path').textContent = location.pathname + location.search;
  </script>
</body>
</html>
